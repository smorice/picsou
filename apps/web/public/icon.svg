  <path d="M82 31 C74 13 92 3 97 21Z" fill="#1a1a1a"/>
  <path d="M174 31 C182 13 164 3 159 21Z" fill="#1a1a1a"/>
  <!-- White face interior -->
  <path d="M128 54 C161 54 189 72 202 103 C215 136 213 169 199 200 C187 223 166 238 146 245 C140 248 134 249 128 249 C122 249 116 248 110 245 C90 238 69 223 57 200 C43 169 41 136 54 103 C67 72 95 54 128 54Z" fill="white"/>
