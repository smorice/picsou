  <!-- Brow ridges -->
  <path d="M82 103 C92 87 108 85 113 95" stroke="#444" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M174 103 C164 87 148 85 143 95" stroke="#444" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="102" cy="118" rx="18" ry="15" fill="#1a1a1a"/>
  <ellipse cx="154" cy="118" rx="18" ry="15" fill="#1a1a1a"/>
  <!-- Nose -->
  <path d="M110 154 C115 172 141 172 146 154 L128 146Z" fill="#1c1c1c"/>
