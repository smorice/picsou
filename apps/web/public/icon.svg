  <ellipse cx="128" cy="197" rx="46" ry="33" fill="white"/>
  <!-- Wide open mouth – roaring -->
  <path d="M87 179 C92 226 164 226 169 179 C164 221 92 221 87 179Z" fill="#4a4a4a"/>
  <!-- Upper teeth band -->
  <path d="M92 179 C100 169 156 169 164 179 L164 190 C156 179 100 179 92 190Z" fill="white"/>
  <!-- Lower chin arc -->
