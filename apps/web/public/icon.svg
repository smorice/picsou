  <defs>
    <radialGradient id="lionMane" cx="50%" cy="38%" r="56%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#6e6e6e"/>
    </radialGradient>
  </defs>
  <!-- Outer dark mane silhouette (scaled from 100→236, offset 10,10) -->
  <path d="M128 20 C166 20 205 33 225 62 C245 91 245 137 233 172 C222 208 197 236 163 253 C154 258 141 261 128 261 C115 261 102 258 93 253 C59 236 34 208 23 172 C11 137 11 91 31 62 C51 33 90 20 128 20Z" fill="url(#lionMane)"/>
