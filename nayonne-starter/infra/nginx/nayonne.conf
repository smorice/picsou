# Isolated Nginx config for Nayonne only.
# This file can be linked from /etc/nginx/sites-available/nayonne.conf
# and enabled without touching Robin's existing config.

upstream nayonne_web {
    server 127.0.0.1:3002;
}

upstream nayonne_api {
    server 127.0.0.1:8082;
}

server {
    listen 80;
    server_name nayonne.ovh;

    location /nayonne/api/ {
        proxy_pass http://nayonne_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /nayonne/ws/ {
        proxy_pass http://nayonne_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /nayonne/ {
        proxy_pass http://nayonne_web/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
