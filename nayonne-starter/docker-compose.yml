services:
  db:
    image: postgres:16-alpine
    container_name: nayonne-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - nayonne_db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nayonne-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - nayonne_redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: nayonne-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - nayonne_minio_data:/data
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    container_name: nayonne-api
    environment:
      APP_ENV: ${APP_ENV}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3002}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_BUCKET: ${MINIO_BUCKET}
      NAYONNE_BASE_PATH: ${NAYONNE_BASE_PATH}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "${API_PORT}:8080"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    container_name: nayonne-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT}:3000"
    restart: unless-stopped

volumes:
  nayonne_db_data:
  nayonne_redis_data:
  nayonne_minio_data:
