services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-picsou}
      POSTGRES_USER: ${POSTGRES_USER:-picsou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-picsou-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-picsou} -d ${POSTGRES_DB:-picsou}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postfix:
    build:
      context: ./apps/postfix
    restart: unless-stopped
    environment:
      POSTFIX_MYHOSTNAME: ${POSTFIX_MYHOSTNAME:-nayonne.ovh}
      POSTFIX_MYDOMAIN: ${POSTFIX_MYDOMAIN:-nayonne.ovh}
      POSTFIX_MYORIGIN: ${POSTFIX_MYORIGIN:-nayonne.ovh}
      POSTFIX_MYNETWORKS: ${POSTFIX_MYNETWORKS:-127.0.0.0/8 172.16.0.0/12 10.0.0.0/8 192.168.0.0/16}
      POSTFIX_MESSAGE_SIZE_LIMIT: ${POSTFIX_MESSAGE_SIZE_LIMIT:-26214400}
      POSTFIX_RELAYHOST: ${POSTFIX_RELAYHOST:-}
    expose:
      - "25"

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      postfix:
        condition: service_started
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-picsou}:${POSTGRES_PASSWORD:-picsou-change-me}@postgres:5432/${POSTGRES_DB:-picsou}
      REDIS_URL: redis://redis:6379/0
      KILL_SWITCH_DEFAULT: ${KILL_SWITCH_DEFAULT:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-development-only-change-me}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      LOGIN_LOCKOUT_MINUTES: ${LOGIN_LOCKOUT_MINUTES:-15}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://nayonne.ovh}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-postfix}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@nayonne.ovh}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Picsou IA}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRANCECONNECT_CLIENT_ID: ${FRANCECONNECT_CLIENT_ID:-}
      FRANCECONNECT_CLIENT_SECRET: ${FRANCECONNECT_CLIENT_SECRET:-}
    expose:
      - "8000"

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      API_BASE_URL: http://api:8000
      DEMO_PORTFOLIO_ID: ${DEMO_PORTFOLIO_ID:-demo}
    expose:
      - "3000"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
